# Zeabur 调度器部署配置
# 后台定时任务：提取器 + 编译器 + 生命周期管理
# 不暴露 HTTP 端口，只运行后台任务

version: "1.0"
services:
  memos-scheduler:
    type: "dockerfile"
    dockerfile: "Dockerfile.zeabur"
    # 注意：调度器不需要暴露端口
    env:
      # 系统模型配置
      - key: "SYSTEM_BASE_URL"
        value: "https://generativelanguage.googleapis.com/v1beta/openai/"
      - key: "SYSTEM_MODEL"
        value: "gemini-2.5-flash"
      - key: "SYSTEM_TEMPERATURE"
        value: "0.3"

      # 应用配置
      - key: "APP_ENV"
        value: "production"
      - key: "LOG_LEVEL"
        value: "INFO"

      # 调度配置
      - key: "SCHEDULE_EXTRACTOR_MINUTES"
        value: "10"
      - key: "SCHEDULE_COMPILER_MINUTES"
        value: "30"

    resources:
      memory: "512Mi"
      cpu: "0.5"
