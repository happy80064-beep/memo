version: '3.8'

services:
  # Ofelia 定时任务调度器（单个容器管理所有任务）
  scheduler:
    build: .
    container_name: memos-scheduler
    restart: unless-stopped
    env_file:
      - .env
    command: python zeabur-scheduler.py
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Ofelia 定时任务调度器 (可选方案)
# 使用 profiles 特性，需要 docker-compose --profile scheduler up 才会启动
