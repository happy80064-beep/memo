# Zeabur Web 服务部署配置
# 专门部署 Web API 服务，与调度器分离

version: "1.0"
services:
  memos-web:
    type: "dockerfile"
    dockerfile: "Dockerfile.web"
    ports:
      - "8000"
    env:
      # 系统模型配置 (Gemini)
      - key: "SYSTEM_BASE_URL"
        value: "https://generativelanguage.googleapis.com/v1beta/openai/"
      - key: "SYSTEM_MODEL"
        value: "gemini-2.5-flash"
      - key: "SYSTEM_TEMPERATURE"
        value: "0.3"

      # 用户模型配置 (Kimi)
      - key: "USER_BASE_URL"
        value: "https://api.moonshot.cn/v1"
      - key: "USER_MODEL"
        value: "kimi-k2-5"
      - key: "USER_TEMPERATURE"
        value: "0.7"

      # 应用配置
      - key: "APP_ENV"
        value: "production"
      - key: "LOG_LEVEL"
        value: "INFO"
      - key: "PORT"
        value: "8000"

      # 这些敏感值需要在 Zeabur 控制台手动设置
      # - SYSTEM_API_KEY
      # - USER_API_KEY
      # - SUPABASE_URL
      # - SUPABASE_SERVICE_ROLE_KEY

    resources:
      memory: "512Mi"
      cpu: "0.5"

    health_check:
      path: "/health"
      port: 8000
